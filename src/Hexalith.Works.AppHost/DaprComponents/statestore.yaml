# DAPR State Store Component -- Local Development
# =============================================================
# Redis-backed state store for actor state, command-status tracking, and the Works what's-next /
# roll-up read models. actorStateStore: "true" enables DAPR actor state management.
#
# Component scoping: EventStore owns aggregate actor state; Works writes its read models; Admin reads
# diagnostics. Story 4.6: Works stays in scope because it now also hosts the date-resume reminder actor
# (its reminder/registration state needs the actor-capable store) and persists terminal-cascade checkpoints
# here. One actor-capable state store is shared across app-ids (DAPR uses a single actor state store).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    # DAPR does not support the `{env:VAR|default}` template form, so an unset REDIS_HOST left the literal
    # string as the hostname and daprd failed with "no such host". `dapr init` provisions Redis at
    # localhost:6379 with no password.
    - name: redisHost
      value: "localhost:6379"
    - name: redisPassword
      value: ""
    - name: actorStateStore
      value: "true"
scopes:
  - eventstore
  - works
  - eventstore-admin
